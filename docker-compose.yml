services:
  baguetteboost-db:
    image: mysql:8.0
    container_name: baguetteboost-db
    restart: always
    # env_file을 지정하면 .env 파일의 변수들이 컨테이너 내부로 주입됩니다.
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # 데이터 영속성 보장 (컨테이너 재시작 시 데이터 휘발 방지)
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - baguetteboost-network
    healthcheck:
      # CMD-SHELL 방식을 사용해야 .env 변수가 정상적으로 치환됨
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $MYSQL_USER -p$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  baguetteboost-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1  # 로그가 버퍼링 없이 즉시 터미널에 출력되도록 강제 설정
      - TZ=Asia/Seoul       # 컨테이너 타임존을 한국 시간으로 통일
    container_name: baguetteboost-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - baguetteboost-network
    # mysql 컨테이너가 실행 후 'healthy' 상태일 때 백엔드 구동
    depends_on:
      baguetteboost-db:
        condition: service_healthy

  baguetteboost-ai:
    build:
      context: ./ai-model-release
      dockerfile: Dockerfile
    container_name: baguetteboost-ai
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - baguetteboost-network
    depends_on:
      baguetteboost-backend:
        condition: service_started

volumes:
  db_data:
    name: baguetteboost-db-data

networks:
  baguetteboost-network:
    name: baguetteboost-network
    driver: bridge

