services:
  baguetteboost-db:
    image: mysql:8.0
    container_name: baguetteboost-db
    restart: always
    # env_file을 지정하면 .env 파일의 변수들이 컨테이너 내부로 주입됩니다.
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # 데이터 영속성 보장 (컨테이너 재시작 시 데이터 휘발 방지)
    networks:
      - baguetteboost-network
    healthcheck:
      # CMD-SHELL 방식을 사용해야 .env 변수가 정상적으로 치환됨
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $MYSQL_USER -p$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  baguetteboost-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baguetteboost-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - baguetteboost-network
    # mysql 컨테이너가 실행 후 'healthy' 상태일 때 백엔드 구동
    depends_on:
      baguetteboost-db:
        condition: service_healthy

  baguetteboost-ai:
    # 예시: AI 서비스 전용 도커파일이 있는 경로 지정 또는 이미지 사용
    # build:
    #   context: ./ai
    #   dockerfile: Dockerfile
    image: python:3.11-slim # AI 컨테이너 이미지 (실제 이미지로 대체 필요)
    container_name: baguetteboost-ai
    restart: unless-stopped
    env_file:
      - .env
    command: tail -f /dev/null # 플레이스홀더용 무한 대기 명령 (실제 AI 실행 명령으로 대체 필요)
    networks:
      - baguetteboost-network
    depends_on:
      - baguetteboost-backend

volumes:
  db_data:
    name: baguetteboost-db-data

networks:
  baguetteboost-network:
    name: baguetteboost-network
    driver: bridge

